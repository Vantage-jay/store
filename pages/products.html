<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - FarmFresh Store</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .category-filter {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        
        .cat-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .cat-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌾 FarmFresh</div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="admin-products.html" id="admin-link" style="display: none;">🛡️ Admin</a>
        </div>
        <div class="auth-links">
            <span id="user-name" style="color: #2563eb; font-weight: bold; display: none;"></span>
            <a href="login.html" id="login-btn">Login</a>
            <a href="#" id="logout-btn" style="display:none" onclick="auth.logout(); return false;">Logout</a>
        </div>
    </nav>

    <!-- Guest Banner -->
    <div id="guest-banner" style="display: none; background: #fef3c7; padding: 1rem; text-align: center; border-bottom: 2px solid #f59e0b;">
        <p>🔒 <strong>Browsing as Guest</strong> — <a href="login.html" style="color: #2563eb; font-weight: 600;">Login or Register</a> to purchase fresh farm products</p>
    </div>

    <main class="products-container">
        <div class="page-header">
            <h1>Fresh Farm Products</h1>
            <p>Direct from our farm to your table</p>
        </div>

        <div class="category-filter">
            <button class="cat-btn active" data-category="all" onclick="filterCategory('all')">All</button>
            <button class="cat-btn" data-category="Vegetables" onclick="filterCategory('Vegetables')">Vegetables</button>
            <button class="cat-btn" data-category="Fruits" onclick="filterCategory('Fruits')">Fruits</button>
            <button class="cat-btn" data-category="Grains" onclick="filterCategory('Grains')">Grains</button>
            <button class="cat-btn" data-category="Tubers" onclick="filterCategory('Tubers')">Tubers</button>
            <button class="cat-btn" data-category="Poultry" onclick="filterCategory('Poultry')">Poultry</button>
            <div class="category-filter" style="display:none;">
        </div>

        <div id="product-grid" class="product-grid"></div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        // Load products from admin storage
        function loadPublicProducts() {
            const adminProducts = localStorage.getItem('adminProducts');
            if (adminProducts) {
                // Parse and set to productDB
                const products = JSON.parse(adminProducts);
                productDB.products = products;
                renderProducts(products);
            } else {
                // Fallback to JSON file
                productDB.load().then(() => renderProducts());
            }
        }
        
        // Override the load
        document.addEventListener('DOMContentLoaded', () => {
            loadPublicProducts();
        });
    </script>
</body>
</html>
