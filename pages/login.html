<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FarmFresh</title>
    <link rel="stylesheet" href="../css/style.css">
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav class="navbar" style="position: relative;">
        <div class="nav-brand">
            <div class="logo-badge">🌾</div>
            <div class="brand-text">
                <span class="brand-name">FarmFresh</span>
            </div>
        </div>
        <a href="../index.html" style="color: #64748b; text-decoration: none;">← Back to Store</a>
    </nav>

    <main class="auth-container" style="max-width: 400px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        
        <!-- Redirect Notice -->
        <div id="redirect-notice" style="display: none; background: #dbeafe; border-left: 4px solid #2563eb; padding: 1rem; margin-bottom: 1.5rem; border-radius: 4px; color: #1e40af;">
            <span id="redirect-message">Please login to continue</span>
        </div>

        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.75rem; color: #1e293b; margin-bottom: 0.5rem;">Welcome Back</h1>
            <p style="color: #64748b; font-size: 0.9rem;">Sign in to shop fresh farm produce</p>
        </div>

        <!-- Tabs -->
        <div style="display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb;">
            <button class="auth-tab active" onclick="showTab('login')" style="flex: 1; padding: 1rem; background: none; border: none; font-size: 1rem; cursor: pointer; color: #2563eb; border-bottom: 2px solid #2563eb; margin-bottom: -2px; font-weight: 600;">Sign In</button>
            <button class="auth-tab" onclick="showTab('signup')" style="flex: 1; padding: 1rem; background: none; border: none; font-size: 1rem; cursor: pointer; color: #64748b;">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active" onsubmit="return handleLogin(event)" style="display: block;">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.9rem;">Email Address</label>
                <input type="email" id="login-email" required placeholder="you@example.com" style="width: 100%; padding: 0.875rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.9rem;">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••" style="width: 100%; padding: 0.875rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
            </div>
            <button type="submit" style="width: 100%; padding: 1rem; background: #22c55e; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form" onsubmit="return handleSignup(event)" style="display: none;">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.9rem;">Full Name</label>
                <input type="text" id="signup-name" required placeholder="John Doe" style="width: 100%; padding: 0.875rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.9rem;">Email Address</label>
                <input type="email" id="signup-email" required placeholder="you@example.com" style="width: 100%; padding: 0.875rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.9rem;">Phone Number</label>
                <input type="tel" id="signup-phone" required placeholder="+234 801 234 5678" style="width: 100%; padding: 0.875rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.9rem;">Password</label>
                <input type="password" id="signup-password" required minlength="6" placeholder="Min 6 characters" style="width: 100%; padding: 0.875rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: #374151; font-size: 0.9rem;">Confirm Password</label>
                <input type="password" id="signup-confirm" required placeholder="••••••••" style="width: 100%; padding: 0.875rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem;">
            </div>
            <button type="submit" style="width: 100%; padding: 1rem; background: #22c55e; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;">Create Account</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb;">
            <a href="../index.html" style="color: #64748b; text-decoration: none; font-size: 0.9rem;">← Continue as Guest</a>
        </div>
    </main>

    <!-- IMPORTANT: Correct paths for pages folder -->
    <script src="../js/auth.js"></script>
    <script>
        // Show redirect message if exists
        const message = sessionStorage.getItem('loginMessage');
        if (message) {
            document.getElementById('redirect-notice').style.display = 'block';
            document.getElementById('redirect-message').textContent = message;
        }

        function showTab(tab) {
            // Update tab styles
            document.querySelectorAll('.auth-tab').forEach(t => {
                t.classList.remove('active');
                t.style.color = '#64748b';
                t.style.borderBottom = 'none';
                t.style.fontWeight = '400';
            });
            
            event.target.classList.add('active');
            event.target.style.color = '#2563eb';
            event.target.style.borderBottom = '2px solid #2563eb';
            event.target.style.marginBottom = '-2px';
            event.target.style.fontWeight = '600';
            
            // Show/hide forms
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            console.log('Login form submitted:', email);
            auth.login(email, password);
            return false;
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const phone = document.getElementById('signup-phone').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            
            if (password !== confirm) {
                alert('❌ Passwords do not match!');
                return false;
            }
            
            console.log('Signup form submitted:', email);
            auth.signup(name, email, password, phone);
            return false;
        }
    </script>
</body>
</html>
